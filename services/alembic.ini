# Alembic configuration for DeskBuddy backend services.
# Each service has its own migration environment under migrations/<service>/

[alembic]
# Use per-service env.py files — see migrations/<service>/env.py
script_location = migrations/auth
sqlalchemy.url = postgresql://deskbuddy:deskbuddy@postgres:5432/deskbuddy_auth

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
